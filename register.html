<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حساب جديد | مطعم فليمز الفاخر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body { padding: 0; min-height: 100vh; display: flex; }

        .auth-split {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        .auth-image {
            flex: 1;
            background: url('https://images.unsplash.com/photo-1550547660-d9450f859349?ixlib=rb-4.0.3&w=1200&q=80') center/cover no-repeat;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding: 60px;
        }

        .auth-image::after {
            content: '';
            position: absolute;
            top:0; left:0; right:0; bottom:0;
            background: linear-gradient(0deg, rgba(15, 17, 21, 0.95) 0%, rgba(15, 17, 21, 0.1) 100%);
            z-index: 1;
        }

        .auth-hero-text {
            position: relative;
            z-index: 2;
        }

        .auth-hero-text h2 {
            font-size: 4rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .auth-panel {
            width: 650px;
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-y: auto;
        }

        .auth-container {
            width: 100%;
            max-width: 500px;
            padding: 40px;
            margin: auto 0;
        }

        .auth-brand {
            font-size: 2.5rem;
            font-weight: 900;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 40px;
            text-shadow: var(--shadow-glow);
        }

        .auth-brand i { color: var(--primary); }

        .auth-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 10px;
            color: #fff;
        }

        .auth-subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .auth-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .auth-input {
            width: 100%;
            padding: 18px 25px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: #fff;
            font-family: inherit;
            font-size: 1.1rem;
            outline: none;
            transition: var(--transition);
        }

        .auth-input.full { grid-column: 1 / -1; }

        .auth-input:focus {
            border-color: var(--primary);
            background: rgba(255, 77, 41, 0.05);
            box-shadow: 0 0 15px rgba(255, 77, 41, 0.1);
        }

        .back-home {
            position: absolute;
            top: 40px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
            font-weight: 700;
            transition: var(--transition);
        }
        .back-home:hover { color: #fff; }

        @media (max-width: 992px) {
            .auth-image { display: none; }
            .auth-panel { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="auth-split">
        <div class="auth-image anim-fade">
            <div class="auth-hero-text">
                <h2>انضم إلى <br><span class="text-gradient">نخبة الذواقة</span>.</h2>
                <p style="font-size: 1.4rem; color: #ccc; max-width: 500px;">أنشئ حساباً اليوم واستمتع بخصومات شهرية على أشهى وجبات اللحوم والمقبلات الحصرية.</p>
            </div>
        </div>

        <div class="auth-panel anim-fade delay-1">
            <a href="index.html" class="back-home"><i class="fa-solid fa-arrow-right"></i> العودة للرئيسية</a>

            <div class="auth-container">
                <a href="index.html" class="auth-brand"><i class="fa-solid fa-fire"></i> فليمز</a>
                
                <h1 class="auth-title">إنشاء حساب جديد</h1>
                <p class="auth-subtitle">خطوة واحدة تفصلك عن تجربة فليمز الفاخرة.</p>

                <form class="auth-form" action="index.html">
                    <div class="auth-grid">
                        <input type="text" class="auth-input" placeholder="الاسم الأول" required>
                        <input type="text" class="auth-input" placeholder="الاسم الأخير" required>
                        <input type="email" class="auth-input full" placeholder="البريد الإلكتروني" required>
                        <input type="tel" class="auth-input full" placeholder="رقم الهاتف" required>
                        <input type="password" class="auth-input" placeholder="كلمة المرور السريّة" required>
                        <input type="password" class="auth-input" placeholder="تأكيد كلمة المرور" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 15px; font-size: 1.25rem;">إنشاء وتفعيل <i class="fa-solid fa-user-plus"></i></button>
                    
                    <div style="text-align:center; color: var(--text-muted); font-size: 1.05rem; margin-top:20px;">
                        لديك حساب بالفعل؟ <a href="login.html" style="color:#fff; font-weight:800; border-bottom:1px solid var(--primary);">سجل دخولك من هنا</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Include main.js for animations to fire -->
    <script src="assets/js/main.js"></script>
</body>
</html>
