<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة المشتريات | مطعم فليمز</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body { padding-top: 100px; }
        .cart-wrapper { display: flex; gap: 40px; align-items: flex-start; margin-bottom: 80px; margin-top: 50px; }
        .cart-items { flex: 1; }
        .cart-summary { width: 380px; background: var(--bg-card); padding: 40px; border-radius: var(--radius); box-shadow: var(--shadow-soft); border: 1px solid var(--border); position: sticky; top: 100px; }
        .cart-summary h3 { font-size: 1.8rem; font-weight: 900; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .summary-line { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 1.1rem; color: var(--text-muted); }
        .summary-total { display: flex; justify-content: space-between; margin-top: 30px; padding-top: 30px; border-top: 2px dashed rgba(255, 77, 41, 0.3); font-size: 1.6rem; font-weight: 900; }
        @media (max-width: 992px) { .cart-wrapper { flex-direction: column; } .cart-summary { width: 100%; position: static; } }
        @media (max-width: 768px) { h1.anim-fade { font-size: 2.5rem !important; } .cart-item { padding: 15px !important; flex-direction: column; text-align: center; } .cart-item img { margin: 0 auto; width: 120px !important; height: 120px !important;} .cart-remove-btn { top: 10px !important; left: 10px !important; } .cart-item > div:last-child { align-self: center !important; margin-top: 10px; } }
    </style>
</head>
<body>

    <header class="header">
        <div class="container">
            <a href="index.html" class="brand"><i class="fa-solid fa-fire"></i> فليمز</a>
            <div class="header-actions">
                <a href="menu.html" class="btn btn-outline" style="padding: 10px 20px; font-size: 0.95rem;">متابعة التسوق <i class="fa-solid fa-arrow-left"></i></a>
            </div>
        </div>
    </header>

    <nav class="mobile-nav">
        <ul class="mobile-nav-list">
            <li><a href="index.html" class="mobile-nav-item"><i class="fa-solid fa-house"></i> الرئيسية</a></li>
            <li><a href="menu.html" class="mobile-nav-item"><i class="fa-solid fa-utensils"></i> المنيو</a></li>
            <li><a href="cart.html" class="mobile-nav-item active"><i class="fa-solid fa-basket-shopping"></i> السلة</a></li>
            <li><a href="login.html" class="mobile-nav-item"><i class="fa-solid fa-user"></i> حسابي</a></li>
        </ul>
    </nav>

    <div class="container section">
        <h1 class="anim-fade" style="font-size: 3rem; font-weight: 900; text-align: center; margin-top:0;">سلة الطلبات</h1>

        <div class="cart-wrapper">
            <div class="cart-items" id="cart-items-container">
               <div style="opacity: 0.5; padding: 20px; text-align: center;">جاري التحميل...</div>
            </div>

            <div class="cart-summary anim-fade delay-1">
                <h3>ملخص الدفع</h3>
                <div class="summary-line"><span>مجموع الأطباق</span> <span id="cart-subtotal">0 ج.م</span></div>
                <div class="summary-line"><span>رسوم التوصيل المبرد</span> <span>25 ج.م</span></div>
                <div class="summary-total"><span>الإجمالي</span> <span class="text-primary" id="cart-total">0 ج.م</span></div>
                <a href="checkout.html" class="btn btn-primary" style="width: 100%; margin-top: 40px; font-size: 1.25rem;">الذهاب لتأكيد الطلب</a>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
